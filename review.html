  <tr><td>A. 按文件名排序</td><td>a.nc → b.nc → c.nc</td></tr>
  <tr><td>B. 依赖图自动排序</td><td>编译器分析依赖关系（复杂）</td></tr>
  <tr><td>C. 禁止跨模块顶层变量</td><td>顶层变量只能在定义它的模块内使用</td></tr>

  }
]

function buildTOC() {
  const toc = document.getElementById('toc')
  sections.forEach(s => {
    const a = document.createElement('a')
    a.href = '#' + s.id
    a.textContent = s.title
    if (s.css === 'prio-red') {
      const span = document.createElement('span')
      span.className = 'priority-red'
      span.textContent = ' 🔴'
      a.appendChild(span)
    }
    toc.appendChild(a)
  })
}

function buildSections() {
  const main = document.getElementById('main')
  sections.forEach(s => {
    const sec = document.createElement('section')
    sec.id = s.id
    if (s.css) sec.className = s.css

    const h2 = document.createElement('h2')
    h2.textContent = s.title

    const body = document.createElement('div')
    body.className = 'section-body'
    body.innerHTML = s.html

    const bar = document.createElement('div')
    bar.className = 'feedback-bar'

    const ta = document.createElement('textarea')
    ta.placeholder = '反馈意见…'
    ta.rows = 1

    const saved = document.createElement('span')
    saved.className = 'saved'
    saved.textContent = '✓ 已提交'

    const btn = document.createElement('button')
    btn.textContent = '提交反馈'

    btn.onclick = async () => {
      const comment = ta.value.trim()
      if (!comment) return
      btn.disabled = true
      btn.textContent = '...'
      try {
        const resp = await fetch('/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ section: s.title, comment })
        })
        const data = await resp.json()
        if (data.ok) {
          ta.value = ''
          saved.classList.add('show')
          setTimeout(() => saved.classList.remove('show'), 2500)
          showStatus('反馈已保存：' + data.file)
        }
      } catch (e) {
        showStatus('提交失败: ' + e.message, true)
      }
      btn.disabled = false
      btn.textContent = '提交反馈'
    }

    bar.appendChild(ta)
    bar.appendChild(btn)
    bar.appendChild(saved)

    sec.appendChild(h2)
    sec.appendChild(body)
    sec.appendChild(bar)
    main.appendChild(sec)
  })
}

function showStatus(msg, isErr) {
  const el = document.getElementById('status')
  el.textContent = msg
  el.className = 'status show' + (isErr ? ' err' : '')
  setTimeout(() => el.classList.remove('show'), 3000)
}

buildTOC()
buildSections()
</script>
