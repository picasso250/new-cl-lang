name: Linux

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Install Python deps
        run: python -m pip install -r requirements.txt
      - name: Run language cases
        run: python tests/test_language_cases.py
      - name: Run stdlib cases
        run: python tests/test_stdlib.py
      - name: Run pytest suites
        run: python -m pytest tests/test_projects.py tests/test_builtin_boundary.py tests/test_llvm_backend.py tests/test_type_ref.py -q
